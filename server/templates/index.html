<h1>Pace Dashboard</h1>

<h2>Download the app for more insights into your data.</h2>

<h3>Total Time Today: {{.totalTimeToday}} minutes</h3>

<h3>Sessions:</h3>
<table>
  <tr>
    <th>ID</th>
    <th>Length</th>
    <th>Description</th>
    <th>Date & Time</th>
  </tr>
  {{ range .sessions }}
  <tr>
    <td>{{.Session_id}}</td>
    <td>{{.Length_minutes}} minutes</td>
    <td>{{.Description}}</td>
    <td>{{.Datetime}}</td>
  </tr>
  {{end}}
</table>
